<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conaplast C.A. - Pedidos</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; background-color: #f2f2f7; margin: 0; }
        h2 { color: #1c1c1e; text-align: center; font-size: 22px; }
        .card { background: #ffffff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #3a3a3c; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; }
        button { background-color: #007aff; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; }
        button:active { background-color: #0056b3; }
        .btn-borrar { background-color: #ff3b30; margin-top: 20px; }
        .btn-borrar:active { background-color: #c93429; }
        .table-container { overflow-x: auto; background: white; border-radius: 12px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #e5e5ea; padding: 10px 5px; text-align: left; }
        th { color: #8e8e93; font-weight: 600; }
        .totales { font-weight: bold; color: #34c759; }
    </style>
</head>
<body>

    <h2>📦 Conaplast C.A.</h2>

    <div class="card">
        <div class="form-group">
            <label for="tasa">Tasa de Cambio (Bs por $):</label>
            <input type="number" id="tasa" step="0.01" placeholder="Ej: 36.50">
        </div>
        <div class="form-group">
            <label for="cliente">Nombre del Cliente:</label>
            <input type="text" id="cliente" placeholder="Ej: Inversiones XYZ">
        </div>
        <div class="form-group">
            <label for="descripcion">Descripción del Producto:</label>
            <input type="text" id="descripcion" placeholder="Ej: Bolsas tipo camiseta">
        </div>
        <div class="form-group">
            <label for="medidas">Medidas (cm o pulgadas):</label>
            <input type="text" id="medidas" placeholder="Ej: 40x50 cm">
        </div>
        <div class="form-group">
            <label for="cantidad">Cantidad de Bolsas:</label>
            <input type="number" id="cantidad" placeholder="Ej: 5000">
        </div>
        <div class="form-group">
            <label for="precio">Precio Unitario ($):</label>
            <input type="number" id="precio" step="0.001" placeholder="Ej: 0.015">
        </div>
        <button onclick="guardarRegistro()">Registrar Venta</button>
    </div>

    <div class="table-container">
        <table id="tablaRegistros">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Detalles</th>
                    <th>Cant.</th>
                    <th>Total ($)</th>
                    <th>Total (Bs)</th>
                </tr>
            </thead>
            <tbody id="listaVentas">
                </tbody>
        </table>
        <button class="btn-borrar" onclick="borrarHistorial()">Borrar Historial</button>
    </div>

    <script>
        // Cargar datos al abrir la aplicación
        let ventas = JSON.parse(localStorage.getItem('ventasConaplast')) || [];
        mostrarVentas();

        function guardarRegistro() {
            const tasa = parseFloat(document.getElementById('tasa').value);
            const cliente = document.getElementById('cliente').value;
            const descripcion = document.getElementById('descripcion').value;
            const medidas = document.getElementById('medidas').value;
            const cantidad = parseFloat(document.getElementById('cantidad').value);
            const precio = parseFloat(document.getElementById('precio').value);

            if (!tasa || !cliente || !cantidad || !precio) {
                alert("⚠️ Por favor, llena al menos la Tasa, Cliente, Cantidad y Precio.");
                return;
            }

            const totalUSD = cantidad * precio;
            const totalBs = totalUSD * tasa;

            // Crear el objeto de la venta
            const nuevaVenta = {
                cliente, descripcion, medidas, cantidad, 
                totalUSD: totalUSD.toFixed(2), 
                totalBs: totalBs.toFixed(2)
            };

            // Guardar en el arreglo y en la memoria del navegador
            ventas.unshift(nuevaVenta); // Lo pone al inicio de la lista
            localStorage.setItem('ventasConaplast', JSON.stringify(ventas));

            // Actualizar la tabla
            mostrarVentas();

            // Limpiar el formulario
            document.getElementById('cliente').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('medidas').value = '';
            document.getElementById('cantidad').value = '';
            document.getElementById('precio').value = '';
        }

        function mostrarVentas() {
            const tbody = document.getElementById('listaVentas');
            tbody.innerHTML = ''; // Limpiar antes de mostrar

            ventas.forEach(venta => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td><strong>${venta.cliente}</strong></td>
                    <td>${venta.descripcion}<br><small style="color: gray;">${venta.medidas}</small></td>
                    <td>${venta.cantidad}</td>
                    <td class="totales">$${venta.totalUSD}</td>
                    <td class="totales">Bs ${venta.totalBs}</td>
                `;
                tbody.appendChild(fila);
            });
        }

        function borrarHistorial() {
            if(confirm("¿Estás seguro de que deseas borrar todo el historial de ventas? Esto no se puede deshacer.")) {
                ventas = [];
                localStorage.removeItem('ventasConaplast');
                mostrarVentas();
            }
        }
    </script>

</body>
</html>
