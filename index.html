<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conaplast C.A.</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; background: linear-gradient(135deg, #0f204c 0%, #1e3a8a 50%, #0f204c 100%); background-attachment: fixed; margin: 0; position: relative; overflow-x: hidden; }
        body::before, body::after { content: ''; position: fixed; width: 300px; height: 300px; background-color: rgba(30, 58, 138, 0.3); transform: rotate(45deg); z-index: -1; }
        body::before { top: -100px; left: -100px; }
        body::after { bottom: -100px; right: -100px; width: 400px; height: 400px; }
        
        .logo-container { text-align: center; margin-bottom: 10px; margin-top: 5px; }
        .logo-img { max-width: 220px; height: auto; }
        
        .tabs { display: flex; background: #ffffff; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #8e8e93; cursor: pointer; border: none; background: transparent; font-size: 15px; transition: 0.3s; }
        .tab-btn.active { background: #0F204C; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .card { background: #ffffff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #3a3a3c; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; }
        
        .input-calculado { background-color: #e5e5ea !important; color: #0F204C; font-weight: bold; border: 1px dashed #a1a1aa; }
        .input-error { border: 1px solid #ff3b30 !important; color: #ff3b30 !important; }
        .input-success { border: 1px solid #34c759 !important; color: #34c759 !important; }
        
        .section-title { color: #0F204C; font-size: 15px; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #e5e5ea; padding-bottom: 5px; margin-top: 20px; }
        
        .switch-container { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid #e5e5ea; border-bottom: 1px solid #e5e5ea; margin-bottom: 15px; }
        .switch-container label { margin-bottom: 0; font-size: 15px; }
        input[type="checkbox"] { width: 20px; height: 20px; }

        button { background-color: #0F204C; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; }
        button:active { background-color: #0B193C; }
        .btn-borrar { background-color: #ff3b30; margin-top: 20px; }
        .btn-wa { background-color: #25D366; padding: 8px 12px; font-size: 14px; margin-top: 0; border-radius: 6px; }
        .btn-action-group { display: flex; gap: 5px; margin-top: 5px; }
        
        .table-container { overflow-x: auto; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .buscador { margin-bottom: 15px; padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #0F204C; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #e5e5ea; padding: 12px 5px; text-align: left; vertical-align: middle; }
        .totales { font-weight: bold; color: #34c759; font-size: 15px; }
        .fecha-tag { font-size: 11px; color: #8e8e93; display: block; margin-bottom: 4px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-title { margin-top: 0; color: #0F204C; font-size: 22px; margin-bottom: 15px; }
        .modal-text { font-size: 18px; color: #1c1c1e; margin: 10px 0; line-height: 1.4; }
        .modal-btn { background-color: #0F204C; margin-top: 20px; }
        .tag-maquina { background: #e5e5ea; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #1c1c1e; margin-right: 5px; display: inline-block; margin-bottom: 3px;}
        .termo-highlight { background-color: #e0f2fe; border: 1px solid #bae6fd; border-radius: 8px; padding: 0 10px; margin-bottom: 10px;}
        .termo-opciones { background: #e0f2fe; border: 1px solid #bae6fd; padding: 15px; border-radius: 8px; margin-bottom: 15px; margin-top: -5px; }
    </style>
</head>
<body>

    <div id="modalResultado" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">✅ Registro Exitoso</h3>
            <div id="modalCuerpoTexto" class="modal-text"></div>
            <button class="modal-btn" onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="Logo Conaplast" class="logo-img" onerror="this.style.display='none'">
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-cotizacion" onclick="switchTab('cotizacion')">Cotización</button>
        <button class="tab-btn" id="btn-produccion" onclick="switchTab('produccion')">Producción</button>
    </div>

    <div id="cotizacion-view" class="view-section active">
        <div class="card">
            <div class="section-title">1. Datos del Cliente</div>
            <div class="form-group"><label for="cliente">Nombre del Cliente:</label><input type="text" id="cliente" placeholder="Ej: Inversiones XYZ"></div>
            <div class="form-group"><label for="rif">RIF:</label><input type="text" id="rif" placeholder="Ej: J-12345678-9"></div>
            
            <div class="section-title">2. Material y Medidas</div>
            
            <div class="switch-container termo-highlight">
                <label for="esTermo" style="color:#0369a1; font-weight:bold;">¿Es Termoencogible?</label>
                <input type="checkbox" id="esTermo" onchange="toggleTermo()">
            </div>
            
            <div id="opcionesTermo" class="termo-opciones" style="display: none;">
                <label for="tipoTermo" style="color:#0369a1;">Tipo de Formato:</label>
                <select id="tipoTermo" style="border: 1px solid #7dd3fc;">
                    <option value="Tipo manga T/M">Tipo manga T/M</option>
                    <option value="Tipo lámina T/L">Tipo lámina T/L</option>
                    <option value="Abierta a un lado">Abierta a un lado</option>
                </select>
            </div>

            <div class="form-group">
                <label for="material">Material a utilizar:</label>
                <select id="material" onchange="calcularBase()">
                    <option value="0.92|Baja Densidad (PEBD)">Baja Densidad (PEBD)</option>
                    <option value="0.96|Alta Densidad (PEAD)">Alta Densidad (PEAD)</option>
                    <option value="0.90|Polipropileno (PP)">Polipropileno (PP)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group"><label for="ancho">Ancho (cm):</label><input type="number" id="ancho" step="0.1" oninput="calcularBase()"></div>
                <div class="form-group" id="box-largo"><label for="largo">Largo (cm):</label><input type="number" id="largo" step="0.1" oninput="calcularBase()"></div>
                <div class="form-group"><label for="espesor">Espesor:</label><input type="number" id="espesor" step="0.001" oninput="calcularBase()"></div>
            </div>

            <div class="switch-container" id="box-fuelle-switch"><label for="llevaFuelle">Fuelle</label><input type="checkbox" id="llevaFuelle" onchange="toggleFuelle()"></div>
            <div id="opcionesFuelle" style="display: none;">
                <div class="form-row">
                    <div class="form-group"><label for="fuelleIzq">Fuelle Izquierdo (cm):</label><input type="number" id="fuelleIzq" step="0.1" oninput="calcularBase()"></div>
                    <div class="form-group"><label for="fuelleDer">Fuelle Derecho (cm):</label><input type="number" id="fuelleDer" step="0.1" oninput="calcularBase()"></div>
                </div>
            </div>

            <div class="switch-container"><label for="impresa">Impresión</label><input type="checkbox" id="impresa" onchange="toggleImpresion()"></div>
            <div id="opcionesImpresion" style="display: none;">
                <div class="form-row">
                    <div class="form-group"><label for="caras">Caras Impresas:</label><select id="caras"><option value="1">1</option><option value="2">2</option></select></div>
                    <div class="form-group"><label for="colores">N° de Colores:</label><select id="colores"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select></div>
                </div>
            </div>

            <div class="section-title">3. Datos del Pedido</div>
            
            <div class="form-row" id="box-pesos-calculados">
                <div class="form-group"><label for="pesoEspecifico">Peso Específico:</label><input type="text" id="pesoEspecifico" class="input-calculado" readonly placeholder="0.00 g"></div>
                <div class="form-group"><label for="pesoMillarKg">Peso Millar:</label><input type="text" id="pesoMillarKg" class="input-calculado" readonly placeholder="0.00 Kg"></div>
            </div>

            <div class="form-row">
                <div class="form-group" id="box-bolsas"><label for="cantidadBolsasInput">Unidades:</label><input type="number" id="cantidadBolsasInput" oninput="calcularDesdeBolsas()"></div>
                <div class="form-group"><label for="cantidadKgInput">Kilos Totales:</label><input type="number" id="cantidadKgInput" oninput="calcularDesdeKg()"></div>
            </div>

            <div class="section-title">4. Finanzas</div>
            <div class="form-row">
                <div class="form-group"><label for="precioKg">Precio por Kg ($):</label><input type="number" id="precioKg" step="0.01" oninput="calcularBase()"></div>
                <div class="form-group" id="box-precio-millar"><label for="precioMillarUSD">Precio Millar ($):</label><input type="text" id="precioMillarUSD" class="input-calculado" readonly placeholder="0.00 $"></div>
            </div>
            <div class="form-group"><label for="tasa">Tasa (Bs por $):</label><input type="number" id="tasa" step="0.01"></div>

            <button onclick="procesarPedido()">Registrar Cotización</button>
        </div>

        <div class="table-container">
            <input type="text" id="buscador" class="buscador" placeholder="🔍 Buscar cliente..." oninput="filtrarVentas()">
            <table id="tablaRegistros"><thead><tr><th>Cliente</th><th>Detalles</th><th>Totales</th><th>Acción</th></tr></thead><tbody id="listaVentas"></tbody></table>
            <button class="btn-borrar" onclick="borrarHistorial()">Borrar Historial</button>
        </div>
    </div>

    <div id="produccion-view" class="view-section">
        <div class="card">
            <div class="section-title">Órdenes a Producir</div>
            <div class="form-group">
                <label for="selectPedidoProd">Selecciona el Pedido Cotizado:</label>
                <select id="selectPedidoProd" onchange="cargarDatosPedidoProd()"><option value="">-- Selecciona un cliente --</option></select>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Kilos Totales a Mezclar:</label><input type="text" id="prodKgTotal" class="input-calculado" readonly placeholder="0 Kg"></div>
                <div class="form-group"><label>Bolsas a Entregar:</label><input type="text" id="prodBolsasTotal" class="input-calculado" readonly placeholder="0 uds"></div>
            </div>

            <div class="section-title">Extrusión y Mezcla</div>
            <div class="form-group">
                <label for="extMaquina">Asignar Extrusora:</label>
                <select id="extMaquina"><script>for(let i=1; i<=10; i++) document.write(`<option value="Extrusora ${i}">Extrusora ${i}</option>`);</script></select>
            </div>
            
            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>Material 1:</label><input type="text" id="mat1Nombre" placeholder="Ej: Fb3003"></div>
                <div class="form-group"><label>%</label><input type="number" id="mat1Pct" value="70" oninput="calcularMezcla()"></div>
                <div class="form-group"><label>Kilos</label><input type="text" id="mat1Kg" class="input-calculado" readonly></div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>Material 2 (Opcional):</label><input type="text" id="mat2Nombre" placeholder="Ej: 11pg1"></div>
                <div class="form-group"><label>%</label><input type="number" id="mat2Pct" value="0" oninput="calcularMezcla()"></div>
                <div class="form-group"><label>Kilos</label><input type="text" id="mat2Kg" class="input-calculado" readonly></div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>Material Recuperado:</label><input type="text" id="recNombre" placeholder="Ej: Recuperado Baja" value="Recuperado"></div>
                <div class="form-group"><label>%</label><input type="number" id="recPct" value="28" oninput="calcularMezcla()"></div>
                <div class="form-group"><label>Kilos</label><input type="text" id="recKg" class="input-calculado" readonly></div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>Pigmentos/Aditivos:</label><input type="text" id="adiNombre" placeholder="Ej: Blanco"></div>
                <div class="form-group"><label>%</label><input type="number" id="adiPct" value="2" oninput="calcularMezcla()"></div>
                <div class="form-group"><label>Kilos</label><input type="text" id="adiKg" class="input-calculado" readonly></div>
            </div>
            <small id="sumaControl" style="display:block; text-align:right; margin-bottom: 15px; color:#8e8e93;">Suma: 100%</small>

            <div class="section-title">Impresión y Sellado</div>
            <div class="form-group">
                <label for="impMaquina">Asignar Impresora:</label>
                <select id="impMaquina"><option value="N/A">Sin Impresión</option><script>for(let i=1; i<=4; i++) document.write(`<option value="Impresora ${i}">Impresora ${i}</option>`);</script></select>
            </div>
            <div class="form-row">
                <div class="form-group"><label for="sellMaquina">Selladora:</label><select id="sellMaquina"><option value="N/A">Sin Sellado (Bobina)</option><script>for(let i=1; i<=16; i++) document.write(`<option value="Selladora ${i}">Selladora ${i}</option>`);</script></select></div>
                <div class="form-group"><label for="sellTipo">Tipo:</label><select id="sellTipo"><option value="Lateral">Lateral</option><option value="Fondo">De Fondo</option><option value="N/A">N/A</option></select></div>
            </div>

            <button onclick="guardarOrdenProduccion()">Generar Orden de Producción</button>
        </div>

        <div class="table-container">
            <h3 style="margin-top:0; color:#0F204C;">Órdenes en Planta</h3>
            <table id="tablaProduccion"><thead><tr><th>Cliente / Máquinas</th><th>Mezcla</th><th>Acción</th></tr></thead><tbody id="listaProduccion"></tbody></table>
            <button class="btn-borrar" onclick="borrarProduccion()">Borrar Órdenes</button>
        </div>
    </div>

    <script>
        // Actualizamos versión para evitar que choque con formatos viejos almacenados
        let ventas = JSON.parse(localStorage.getItem('ventasConaplastV15')) || [];
        let ordenesProd = JSON.parse(localStorage.getItem('prodConaplastV6')) || []; 
        
        mostrarVentas(ventas);
        mostrarOrdenes();

        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            if(tabId === 'produccion') actualizarSelectPedidosProd();
        }

        function formatearMoneda(valorNum) { return Number(valorNum).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        function toggleTermo() {
            const isTermo = document.getElementById('esTermo').checked;
            
            document.getElementById('opcionesTermo').style.display = isTermo ? 'block' : 'none';
            document.getElementById('box-largo').style.display = isTermo ? 'none' : 'block';
            document.getElementById('box-fuelle-switch').style.display = isTermo ? 'none' : 'flex';
            document.getElementById('box-bolsas').style.display = isTermo ? 'none' : 'block';
            document.getElementById('box-pesos-calculados').style.display = isTermo ? 'none' : 'flex';
            document.getElementById('box-precio-millar').style.display = isTermo ? 'none' : 'block';
            
            if (isTermo) {
                document.getElementById('largo').value = '';
                document.getElementById('cantidadBolsasInput').value = '';
                document.getElementById('llevaFuelle').checked = false;
                toggleFuelle();
            }
            calcularBase();
        }

        function getPesoUnaBolsaKg() {
            if (document.getElementById('esTermo').checked) return 0; 

            const ancho = parseFloat(document.getElementById('ancho').value) || 0;
            const largo = parseFloat(document.getElementById('largo').value) || 0;
            const espesor = parseFloat(document.getElementById('espesor').value) || 0;
            const llevaFuelle = document.getElementById('llevaFuelle').checked;
            const fI = llevaFuelle ? (parseFloat(document.getElementById('fuelleIzq').value) || 0) : 0;
            const fD = llevaFuelle ? (parseFloat(document.getElementById('fuelleDer').value) || 0) : 0;
            const densidad = parseFloat(document.getElementById('material').value.split('|')[0]);

            if (ancho > 0 && largo > 0 && espesor > 0) return ((fI + ancho + fD) * largo * (espesor * 2) * densidad) / 1000;
            return 0;
        }

        function calcularBase() {
            const isTermo = document.getElementById('esTermo').checked;
            const pesoKg = getPesoUnaBolsaKg();
            
            if (!isTermo && pesoKg > 0) {
                document.getElementById('pesoEspecifico').value = (pesoKg * 1000).toFixed(2) + ' g';
                document.getElementById('pesoMillarKg').value = (pesoKg * 1000).toFixed(2) + ' Kg';
                if(document.getElementById('cantidadBolsasInput').value) calcularDesdeBolsas();
                else if(document.getElementById('cantidadKgInput').value) calcularDesdeKg();
            } else { 
                document.getElementById('pesoEspecifico').value = ''; 
                document.getElementById('pesoMillarKg').value = ''; 
            }

            calcularPreciosFinanzas();
        }

        function calcularDesdeBolsas() {
            if (document.getElementById('esTermo').checked) return;
            const bolsas = parseFloat(document.getElementById('cantidadBolsasInput').value) || 0;
            const pesoU = getPesoUnaBolsaKg();
            document.getElementById('cantidadKgInput').value = (pesoU > 0 && bolsas > 0) ? (bolsas * pesoU).toFixed(2) : '';
        }

        function calcularDesdeKg() {
            if (document.getElementById('esTermo').checked) return;
            const kg = parseFloat(document.getElementById('cantidadKgInput').value) || 0;
            const pesoU = getPesoUnaBolsaKg();
            document.getElementById('cantidadBolsasInput').value = (pesoU > 0 && kg > 0) ? Math.floor(kg / pesoU) : '';
        }

        function calcularPreciosFinanzas() {
            if (document.getElementById('esTermo').checked) {
                document.getElementById('precioMillarUSD').value = '';
                return;
            }
            const pesoM = getPesoUnaBolsaKg() * 1000;
            const precioKg = parseFloat(document.getElementById('precioKg').value) || 0;
            document.getElementById('precioMillarUSD').value = (pesoM > 0 && precioKg > 0) ? formatearMoneda(pesoM * precioKg) + ' $' : '';
        }

        function toggleImpresion() { document.getElementById('opcionesImpresion').style.display = document.getElementById('impresa').checked ? 'block' : 'none'; }
        function toggleFuelle() { document.getElementById('opcionesFuelle').style.display = document.getElementById('llevaFuelle').checked ? 'block' : 'none'; calcularBase(); }
        function cerrarModal() { document.getElementById('modalResultado').style.display = 'none'; }

        function procesarPedido() {
            const isTermo = document.getElementById('esTermo').checked;
            const cliente = document.getElementById('cliente').value;
            const kgFinal = parseFloat(document.getElementById('cantidadKgInput').value);
            const precioKg = parseFloat(document.getElementById('precioKg').value);
            const tasa = parseFloat(document.getElementById('tasa').value);
            const ancho = document.getElementById('ancho').value;
            const esp = document.getElementById('espesor').value;
            const largo = document.getElementById('largo').value;
            
            if (!cliente || !kgFinal || !precioKg || !tasa || !ancho || !esp || (!isTermo && !largo)) { 
                alert("⚠️ Completa los datos principales correspondientes al tipo de producto."); 
                return; 
            }

            const llevaFuelle = document.getElementById('llevaFuelle').checked;
            const fI = document.getElementById('fuelleIzq').value;
            const fD = document.getElementById('fuelleDer').value;
            const nombreMat = document.getElementById('material').value.split('|')[1];
            const esImp = document.getElementById('impresa').checked;
            
            let strMedidas = "";
            if (isTermo) {
                const tipoLamina = document.getElementById('tipoTermo').value;
                strMedidas = `Termoencogible (${tipoLamina}): ${ancho}cm x ${esp}`;
            } else {
                strMedidas = llevaFuelle ? `${fI}+${ancho}+${fD}*${largo}*${esp}` : `${ancho}*${largo}*${esp}`;
            }
            
            const totalUSDRaw = kgFinal * precioKg;
            const bolsasFinal = isTermo ? "Termoencogible" : parseInt(document.getElementById('cantidadBolsasInput').value).toLocaleString('es-VE');
            const precioM = isTermo ? "N/A" : formatearMoneda(getPesoUnaBolsaKg() * 1000 * precioKg);

            const nuevaVenta = {
                id: Date.now().toString(), fecha: new Date().toLocaleDateString('es-VE'), cliente, rif: document.getElementById('rif').value || 'N/A', 
                material: nombreMat, medidas: strMedidas, espesor: esp, esImpresa: esImp, caras: esImp ? document.getElementById('caras').value : '0', colores: esImp ? document.getElementById('colores').value : '0',
                pesoKg: kgFinal.toFixed(2), rawPesoKg: kgFinal, cantidadBolsas: bolsasFinal, rawBolsas: bolsasFinal, isTermo: isTermo,
                totalUSD: formatearMoneda(totalUSDRaw), totalBs: formatearMoneda(totalUSDRaw * tasa), precioM: precioM,
                rawPrecioKg: precioKg, rawTasa: tasa
            };

            ventas.unshift(nuevaVenta);
            localStorage.setItem('ventasConaplastV15', JSON.stringify(ventas));
            document.getElementById('buscador').value = ''; mostrarVentas(ventas); actualizarSelectPedidosProd();
            
            document.getElementById('modalCuerpoTexto').innerHTML = `<strong>Kilos:</strong><br><span style="font-size:26px;color:#0F204C">${nuevaVenta.pesoKg} Kg</span>`;
            document.getElementById('modalResultado').style.display = 'flex';
        }

        function filtrarVentas() {
            const txt = document.getElementById('buscador').value.toLowerCase();
            mostrarVentas(ventas.filter(v => v.cliente.toLowerCase().includes(txt) || v.fecha.includes(txt)));
        }

        function mostrarVentas(arr) {
            const tbody = document.getElementById('listaVentas'); tbody.innerHTML = ''; 
            arr.forEach((v, i) => {
                const tr = document.createElement('tr');
                const infoRendimiento = v.isTermo ? `<small style="color:#0369a1; font-weight:bold;">${v.cantidadBolsas}</small>` : `<small>${v.cantidadBolsas} uds</small><br><small style="color:#0F204C">Millar: $${v.precioM}</small>`;
                
                tr.innerHTML = `<td><span class="fecha-tag">${v.fecha}</span><strong>${v.cliente}</strong></td>
                    <td><small>${v.pesoKg} Kg</small><br>${infoRendimiento}<br><small style="color:gray">${v.medidas}</small></td>
                    <td><span class="totales">$${v.totalUSD}</span></td>
                    <td><button class="btn-wa" onclick="enviarWA(${i})">WA</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function enviarWA(i) {
            const v = ventas[i];
            const detImp = v.esImpresa ? `\n\n🎨 *Impresión:*\n• Caras: ${v.caras} / Colores: ${v.colores}` : `\n\n🎨 *Sin impresión*`;
            const rendimientoTxt = v.isTermo ? `\n• Formato: Termoencogible` : `\n• Bolsas aprox: ${v.cantidadBolsas}`;
            const precioMTxt = v.isTermo ? `` : `\n• Precio Millar: $${v.precioM}`;
            
            const msg = `Cotización *Conaplast C.A.*\n\n👤 *Cliente:* ${v.cliente}\n• RIF: ${v.rif}\n\n📦 *Especificaciones:*\n• Material: ${v.material}\n• Medidas: ${v.medidas}\n• Pedido: ${v.pesoKg} Kg${rendimientoTxt}${detImp}\n\n💰 *Total:*${precioMTxt}\n• $${v.totalUSD} / Bs. ${v.totalBs}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // LÓGICA DE PRODUCCIÓN 
        let pedidoActualKg = 0;

        function actualizarSelectPedidosProd() {
            const sel = document.getElementById('selectPedidoProd'); sel.innerHTML = '<option value="">-- Selecciona un pedido --</option>';
            ventas.forEach(v => { const opt = document.createElement('option'); opt.value = v.id; opt.text = `${v.cliente} - ${v.pesoKg} Kg`; sel.appendChild(opt); });
        }

        function cargarDatosPedidoProd() {
            const id = document.getElementById('selectPedidoProd').value;
            const p = ventas.find(v => v.id === id);
            if (p) {
                document.getElementById('prodKgTotal').value = p.pesoKg + ' Kg';
                document.getElementById('prodBolsasTotal').value = p.isTermo ? "Termoencogible" : p.cantidadBolsas + ' uds';
                pedidoActualKg = p.rawPesoKg;
                document.getElementById('impMaquina').value = p.esImpresa ? "Impresora 1" : "N/A";
                
                if (p.isTermo) {
                    document.getElementById('sellMaquina').value = "N/A";
                    document.getElementById('sellTipo').value = "N/A";
                }
                
                calcularMezcla();
            } else {
                pedidoActualKg = 0; document.getElementById('prodKgTotal').value = ''; document.getElementById('prodBolsasTotal').value = '';
                document.getElementById('mat1Kg').value = ''; document.getElementById('mat2Kg').value = ''; 
                document.getElementById('recKg').value = ''; document.getElementById('adiKg').value = '';
                document.getElementById('sumaControl').innerText = "Suma: 0%";
            }
        }

        function calcularMezcla() {
            if (pedidoActualKg === 0) return;
            const p1 = parseFloat(document.getElementById('mat1Pct').value) || 0;
            const p2 = parseFloat(document.getElementById('mat2Pct').value) || 0;
            const prec = parseFloat(document.getElementById('recPct').value) || 0;
            const pa = parseFloat(document.getElementById('adiPct').value) || 0;
            
            const suma = p1 + p2 + prec + pa;
            const ctrl = document.getElementById('sumaControl'); ctrl.innerText = `Suma: ${suma}%`;
            
            if (suma === 100) {
                ctrl.className = 'input-success';
                document.getElementById('mat1Kg').value = ((p1/100)*pedidoActualKg).toFixed(1) + ' Kg';
                document.getElementById('mat2Kg').value = ((p2/100)*pedidoActualKg).toFixed(1) + ' Kg';
                document.getElementById('recKg').value = ((prec/100)*pedidoActualKg).toFixed(1) + ' Kg';
                document.getElementById('adiKg').value = ((pa/100)*pedidoActualKg).toFixed(1) + ' Kg';
            } else {
                ctrl.className = 'input-error'; 
                document.getElementById('mat1Kg').value = 'Error'; 
                document.getElementById('mat2Kg').value = 'Error'; 
                document.getElementById('recKg').value = 'Error';
                document.getElementById('adiKg').value = 'Error';
            }
        }

        function guardarOrdenProduccion() {
            const id = document.getElementById('selectPedidoProd').value;
            if (!id) { alert("⚠️ Selecciona un pedido cotizado."); return; }
            if (document.getElementById('sumaControl').innerText !== "Suma: 100%") { alert("🛑 La mezcla debe sumar 100%."); return; }

            const p = ventas.find(v => v.id === id);
            const nO = {
                idPedido: id, cliente: p.cliente, medidas: p.medidas, pesoKg: p.pesoKg, bolsas: p.isTermo ? "Termoencogible" : p.cantidadBolsas, fecha: new Date().toLocaleDateString('es-VE'),
                extrusora: document.getElementById('extMaquina').value,
                mat1: `${document.getElementById('mat1Nombre').value || 'Mat 1'}: ${document.getElementById('mat1Pct').value}% (${document.getElementById('mat1Kg').value})`,
                mat2: document.getElementById('mat2Pct').value > 0 ? `${document.getElementById('mat2Nombre').value || 'Mat 2'}: ${document.getElementById('mat2Pct').value}% (${document.getElementById('mat2Kg').value})` : null,
                rec: document.getElementById('recPct').value > 0 ? `${document.getElementById('recNombre').value || 'Recuperado'}: ${document.getElementById('recPct').value}% (${document.getElementById('recKg').value})` : null,
                aditivo: document.getElementById('adiPct').value > 0 ? `${document.getElementById('adiNombre').value || 'Aditivo'}: ${document.getElementById('adiPct').value}% (${document.getElementById('adiKg').value})` : null,
                impresora: document.getElementById('impMaquina').value, selladora: document.getElementById('sellMaquina').value, selladoTipo: document.getElementById('sellTipo').value
            };

            ordenesProd.unshift(nO); localStorage.setItem('prodConaplastV6', JSON.stringify(ordenesProd)); mostrarOrdenes();
            document.getElementById('modalCuerpoTexto').innerHTML = `<strong>Orden Generada</strong><br><span style="font-size:18px;color:#0F204C">Enviado a ${nO.extrusora}</span>`;
            document.getElementById('modalResultado').style.display = 'flex';
        }

        function mostrarOrdenes() {
            const tbody = document.getElementById('listaProduccion'); tbody.innerHTML = ''; 
            ordenesProd.forEach((o, i) => {
                const tr = document.createElement('tr');
                let mz = `<li>${o.mat1}</li>`; 
                if(o.mat2) mz += `<li>${o.mat2}</li>`; 
                if(o.rec) mz += `<li>${o.rec}</li>`;
                if(o.aditivo) mz += `<li>${o.aditivo}</li>`;

                tr.innerHTML = `<td><span class="fecha-tag">${o.fecha}</span><strong>${o.cliente}</strong> (${o.pesoKg} Kg)<br>
                    <span class="tag-maquina">EXT: ${o.extrusora.replace('Extrusora ','E')}</span>
                    ${o.impresora !== 'N/A' ? `<span class="tag-maquina">IMP: ${o.impresora.replace('Impresora ','I')}</span>` : ''}
                    ${o.selladora !== 'N/A' ? `<span class="tag-maquina">SEL: ${o.selladora.replace('Selladora ','S')} (${o.selladoTipo.charAt(0)})</span>` : '<span class="tag-maquina" style="background:#bae6fd;">TERMO</span>'}
                    </td>
                    <td><ul style="margin:0; padding-left:15px; font-size:12px; color:gray;">${mz}</ul></td>
                    <td>
                        <div class="btn-action-group">
                            <button class="btn-wa" style="flex:1;" onclick="enviarWAProd(${i})">WA</button>
                            <button class="btn-borrar" style="margin-top:0; padding: 8px; flex:0.5;" onclick="eliminarOrden(${i})">X</button>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        function enviarWAProd(index) {
            const o = ordenesProd[index];
            let mezclaTexto = `• ${o.mat1}`;
            if(o.mat2) mezclaTexto += `\n• ${o.mat2}`;
            if(o.rec) mezclaTexto += `\n• ${o.rec}`;
            if(o.aditivo) mezclaTexto += `\n• ${o.aditivo}`;
            
            const txtSellado = o.selladora === 'N/A' ? `✂️ *3. SELLADO:* No aplica (Termoencogible)` : `✂️ *3. SELLADO:* ${o.selladora} (${o.selladoTipo})`;

            const msg = `🏭 *ORDEN DE PRODUCCIÓN - Conaplast C.A.*\n\n👤 *Cliente:* ${o.cliente}\n📦 *Pedido:* ${o.pesoKg} Kg | ${o.bolsas}\n📏 *Medidas:* ${o.medidas}\n\n⚙️ *1. EXTRUSIÓN:* ${o.extrusora}\n*Mezcla:*\n${mezclaTexto}\n\n🖨️ *2. IMPRESIÓN:* ${o.impresora}\n\n${txtSellado}`;
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function eliminarOrden(i) { if(confirm("¿Borrar esta orden?")) { ordenesProd.splice(i, 1); localStorage.setItem('prodConaplastV6', JSON.stringify(ordenesProd)); mostrarOrdenes(); } }
        function borrarHistorial() { if(confirm("¿Borrar todo el historial de Cotizaciones?")) { ventas = []; localStorage.removeItem('ventasConaplastV15'); mostrarVentas(ventas); } }
        function borrarProduccion() { if(confirm("¿Borrar todas las órdenes de producción?")) { ordenesProd = []; localStorage.removeItem('prodConaplastV6'); mostrarOrdenes(); } }
    </script>
</body>
</html>
