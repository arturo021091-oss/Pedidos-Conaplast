<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conaplast C.A. - Cotizador</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; background-color: #f2f2f7; margin: 0; }
        
        .logo-container { text-align: center; margin-bottom: 5px; margin-top: 10px; }
        .logo-img { max-width: 250px; height: auto; }
        
        p.subtitle { text-align: center; color: #8e8e93; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        .card { background: #ffffff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #3a3a3c; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; }
        
        /* Estilo para los campos de cálculo automático */
        .input-calculado { background-color: #e5e5ea !important; color: #0F204C; font-weight: bold; border: 1px dashed #a1a1aa; }
        
        .section-title { color:#0F204C; font-size: 15px; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #e5e5ea; padding-bottom: 5px; margin-top: 20px; }
        
        .switch-container { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid #e5e5ea; border-bottom: 1px solid #e5e5ea; margin-bottom: 15px; }
        .switch-container label { margin-bottom: 0; font-size: 15px; }
        input[type="checkbox"] { width: 20px; height: 20px; }

        button { background-color: #0F204C; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; }
        button:active { background-color: #0B193C; }
        .btn-borrar { background-color: #ff3b30; margin-top: 20px; }
        .btn-borrar:active { background-color: #c93429; }
        .btn-wa { background-color: #25D366; padding: 8px 12px; font-size: 14px; margin-top: 0; border-radius: 6px; }
        
        .table-container { overflow-x: auto; background: white; border-radius: 12px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        /* Aumentamos el tamaño de la letra de la tabla */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #e5e5ea; padding: 12px 5px; text-align: left; vertical-align: middle; }
        th { color: #8e8e93; font-weight: 600; }
        .totales { font-weight: bold; color: #34c759; font-size: 15px; }
        .impresion-tag { color: #ff9500; font-size: 12px; font-weight: bold; }
        
        /* Estilos de la ventana emergente (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-title { margin-top: 0; color: #0F204C; font-size: 22px; margin-bottom: 15px; }
        .modal-text { font-size: 18px; color: #1c1c1e; margin: 10px 0; line-height: 1.4; }
        .modal-btn { background-color: #0F204C; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="modalResultado" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">✅ Cálculo Exitoso</h3>
            <div id="modalCuerpoTexto" class="modal-text"></div>
            <button class="modal-btn" onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="Logo Conaplast" class="logo-img" onerror="this.style.display='none'">
    </div>
    <p class="subtitle">Cotizador Industrial</p>

    <div class="card">
        <div class="section-title">1. Datos del Cliente</div>
        <div class="form-group">
            <label for="cliente">Nombre del Cliente:</label>
            <input type="text" id="cliente" placeholder="Ej: Inversiones XYZ">
        </div>
        <div class="form-group">
            <label for="rif">RIF:</label>
            <input type="text" id="rif" placeholder="Ej: J-12345678-9">
        </div>
        
        <div class="section-title">2. Medidas de la Bolsa (cm)</div>
        <div class="form-row">
            <div class="form-group">
                <label for="ancho">Ancho:</label>
                <input type="number" id="ancho" step="0.1" placeholder="Ej: 40" oninput="calcularPesosAutomaticos()">
            </div>
            <div class="form-group">
                <label for="largo">Largo:</label>
                <input type="number" id="largo" step="0.1" placeholder="Ej: 50" oninput="calcularPesosAutomaticos()">
            </div>
            <div class="form-group">
                <label for="espesor">Espesor:</label>
                <input type="number" id="espesor" step="0.001" placeholder="Ej: 0.005" oninput="calcularPesosAutomaticos()">
            </div>
        </div>

        <div class="switch-container">
            <label for="llevaFuelle">¿Lleva fuelle?</label>
            <input type="checkbox" id="llevaFuelle" onchange="toggleFuelle()">
        </div>

        <div id="opcionesFuelle" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="fuelleIzq">Fuelle Izquierdo (cm):</label>
                    <input type="number" id="fuelleIzq" step="0.1" placeholder="Ej: 5" oninput="calcularPesosAutomaticos()">
                </div>
                <div class="form-group">
                    <label for="fuelleDer">Fuelle Derecho (cm):</label>
                    <input type="number" id="fuelleDer" step="0.1" placeholder="Ej: 5" oninput="calcularPesosAutomaticos()">
                </div>
            </div>
        </div>

        <div class="section-title">3. Impresión</div>
        <div class="switch-container">
            <label for="impresa">¿Bolsa Impresa?</label>
            <input type="checkbox" id="impresa" onchange="toggleImpresion()">
        </div>
        
        <div id="opcionesImpresion" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="caras">Caras Impresas:</label>
                    <select id="caras">
                        <option value="1">1 Cara</option>
                        <option value="2">2 Caras</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="colores">N° de Colores (Max 6):</label>
                    <select id="colores">
                        <option value="1">1 Color</option>
                        <option value="2">2 Colores</option>
                        <option value="3">3 Colores</option>
                        <option value="4">4 Colores</option>
                        <option value="5">5 Colores</option>
                        <option value="6">6 Colores</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-title">4. Datos del Pedido</div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="pesoEspecifico">Peso Específico (g):</label>
                <input type="text" id="pesoEspecifico" class="input-calculado" readonly placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="pesoMillar">Peso Millar (Kg):</label>
                <input type="text" id="pesoMillar" class="input-calculado" readonly placeholder="0.00">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="tipoCalculo">Calcular a partir de:</label>
                <select id="tipoCalculo" onchange="actualizarPlaceholder()">
                    <option value="kg">Kg</option>
                    <option value="unidades">Bolsas</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lblValor" for="valorPedido">Cantidad (Kg):</label>
                <input type="number" id="valorPedido" placeholder="Mínimo 300">
            </div>
        </div>

        <div class="section-title">5. Finanzas</div>
        <div class="form-row">
            <div class="form-group">
                <label for="precioKg">Precio por Kg ($):</label>
                <input type="number" id="precioKg" step="0.01" placeholder="Ej: 2.50">
            </div>
            <div class="form-group">
                <label for="tasa">Tasa (Bs por $):</label>
                <input type="number" id="tasa" step="0.01">
            </div>
        </div>

        <button onclick="procesarPedido()">Calcular y Registrar Pedido</button>
    </div>

    <div class="table-container">
        <table id="tablaRegistros">
            <thead>
                <tr>
                    <th>Cliente / RIF</th>
                    <th>Detalles</th>
                    <th>Totales</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="listaVentas"></tbody>
        </table>
        <button class="btn-borrar" onclick="borrarHistorial()">Borrar Historial</button>
    </div>

    <script>
        let ventas = JSON.parse(localStorage.getItem('ventasConaplastV5')) || [];
        mostrarVentas();

        // Novedad: Cálculo en tiempo real mientras escribes
        function calcularPesosAutomaticos() {
            const ancho = parseFloat(document.getElementById('ancho').value) || 0;
            const largo = parseFloat(document.getElementById('largo').value) || 0;
            const espesor = parseFloat(document.getElementById('espesor').value) || 0;
            const llevaFuelle = document.getElementById('llevaFuelle').checked;
            const fuelleIzq = llevaFuelle ? (parseFloat(document.getElementById('fuelleIzq').value) || 0) : 0;
            const fuelleDer = llevaFuelle ? (parseFloat(document.getElementById('fuelleDer').value) || 0) : 0;
            const densidad = 0.92;

            if (ancho > 0 && largo > 0 && espesor > 0) {
                const anchoTotal = fuelleIzq + ancho + fuelleDer;
                const volumenBolsa = anchoTotal * largo * (espesor * 2);
                
                const pesoEspecificoGramos = volumenBolsa * densidad; // Peso de 1 bolsa en gramos
                const pesoMillarKg = pesoEspecificoGramos; // 1000 bolsas en gramos equivale al mismo número en Kg

                document.getElementById('pesoEspecifico').value = pesoEspecificoGramos.toFixed(2);
                document.getElementById('pesoMillar').value = pesoMillarKg.toFixed(2);
            } else {
                document.getElementById('pesoEspecifico').value = '';
                document.getElementById('pesoMillar').value = '';
            }
        }

        function toggleImpresion() {
            const isChecked = document.getElementById('impresa').checked;
            document.getElementById('opcionesImpresion').style.display = isChecked ? 'block' : 'none';
        }

        function toggleFuelle() {
            const isChecked = document.getElementById('llevaFuelle').checked;
            document.getElementById('opcionesFuelle').style.display = isChecked ? 'block' : 'none';
            if (!isChecked) {
                document.getElementById('fuelleIzq').value = '';
                document.getElementById('fuelleDer').value = '';
            }
            calcularPesosAutomaticos(); // Recalcular si apagan el fuelle
        }

        function actualizarPlaceholder() {
            const tipo = document.getElementById('tipoCalculo').value;
            const lbl = document.getElementById('lblValor');
            const input = document.getElementById('valorPedido');
            
            if(tipo === 'kg') {
                lbl.innerText = 'Cantidad (Kg):';
                input.placeholder = 'Mínimo 300';
            } else {
                lbl.innerText = 'Cantidad (Bolsas):';
                input.placeholder = 'Ej: 50000';
            }
        }

        function mostrarModal(mensajeHtml) {
            document.getElementById('modalCuerpoTexto').innerHTML = mensajeHtml;
            document.getElementById('modalResultado').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalResultado').style.display = 'none';
        }

        function procesarPedido() {
            const cliente = document.getElementById('cliente').value;
            const rif = document.getElementById('rif').value;
            const ancho = parseFloat(document.getElementById('ancho').value);
            const largo = parseFloat(document.getElementById('largo').value);
            const espesor = parseFloat(document.getElementById('espesor').value);
            const tipoCalculo = document.getElementById('tipoCalculo').value;
            const valorPedido = parseFloat(document.getElementById('valorPedido').value);
            const precioKg = parseFloat(document.getElementById('precioKg').value);
            const tasa = parseFloat(document.getElementById('tasa').value);
            
            const densidad = 0.92; 

            if (!cliente || !ancho || !largo || !espesor || !valorPedido || !precioKg || !tasa) {
                alert("⚠️ Por favor, llena todos los campos numéricos y el nombre del cliente.");
                return;
            }

            const llevaFuelle = document.getElementById('llevaFuelle').checked;
            const fuelleIzq = llevaFuelle ? (parseFloat(document.getElementById('fuelleIzq').value) || 0) : 0;
            const fuelleDer = llevaFuelle ? (parseFloat(document.getElementById('fuelleDer').value) || 0) : 0;

            const esImpresa = document.getElementById('impresa').checked;
            const caras = esImpresa ? document.getElementById('caras').value : 0;
            const colores = esImpresa ? document.getElementById('colores').value : 0;

            const anchoTotal = fuelleIzq + ancho + fuelleDer;
            const volumenBolsa = anchoTotal * largo * (espesor * 2);
            const pesoUnaBolsaKg = (volumenBolsa * densidad) / 1000;

            let pesoTotalCalculado = 0;
            let bolsasCalculadas = 0;

            if (tipoCalculo === 'kg') {
                pesoTotalCalculado = valorPedido;
                if (pesoTotalCalculado < 300) {
                    alert("🛑 El pedido mínimo aceptado por la compañía es de 300 kg.");
                    return;
                }
                bolsasCalculadas = Math.floor(pesoTotalCalculado / pesoUnaBolsaKg);
            } else {
                bolsasCalculadas = valorPedido;
                pesoTotalCalculado = bolsasCalculadas * pesoUnaBolsaKg;
                
                if (pesoTotalCalculado < 300) {
                    let confirmar = confirm(`⚠️ Esas ${bolsasCalculadas} bolsas pesan ${pesoTotalCalculado.toFixed(2)} kg. Es MENOR al mínimo de 300kg de la compañía.\n\n¿Registrar de todas formas?`);
                    if (!confirmar) return;
                }
            }

            const totalUSD = pesoTotalCalculado * precioKg;
            const totalBs = totalUSD * tasa;

            let textoMedidas = `${ancho}x${largo} cm (Esp: ${espesor})`;
            if (llevaFuelle && (fuelleIzq > 0 || fuelleDer > 0)) {
                textoMedidas = `[FI:${fuelleIzq} + A:${ancho} + FD:${fuelleDer}] x L:${largo} cm`;
            }

            const nuevaVenta = {
                cliente, rif,
                medidas: textoMedidas,
                esImpresa, caras, colores,
                pesoKg: pesoTotalCalculado.toFixed(2),
                cantidadBolsas: bolsasCalculadas.toLocaleString('es-VE'),
                precioKg, tasa,
                totalUSD: totalUSD.toFixed(2),
                totalBs: totalBs.toFixed(2)
            };

            ventas.unshift(nuevaVenta);
            localStorage.setItem('ventasConaplastV5', JSON.stringify(ventas));
            mostrarVentas();

            // Mensaje grande para el modal
            const mensajeFinal = `
                <strong>Peso total:</strong><br><span style="color:#0F204C; font-size:26px;">${pesoTotalCalculado.toFixed(2)} kg</span><br><br>
                <strong>Unidades:</strong><br><span style="color:#0F204C; font-size:26px;">${bolsasCalculadas.toLocaleString('es-VE')} bolsas</span>
            `;
            mostrarModal(mensajeFinal);

            // Limpiar campos
            document.getElementById('cliente').value = '';
            document.getElementById('rif').value = '';
            document.getElementById('ancho').value = '';
            document.getElementById('largo').value = '';
            document.getElementById('espesor').value = '';
            document.getElementById('valorPedido').value = '';
            document.getElementById('fuelleIzq').value = '';
            document.getElementById('fuelleDer').value = '';
            document.getElementById('impresa').checked = false;
            document.getElementById('llevaFuelle').checked = false;
            document.getElementById('pesoEspecifico').value = '';
            document.getElementById('pesoMillar').value = '';
            toggleImpresion();
            toggleFuelle();
        }

        function mostrarVentas() {
            const tbody = document.getElementById('listaVentas');
            tbody.innerHTML = ''; 

            ventas.forEach((venta, index) => {
                let textoImpresion = venta.esImpresa 
                    ? `<br><span class="impresion-tag">🖨️ Impresa: ${venta.caras} cara(s), ${venta.colores} color(es)</span>` 
                    : '<br><span style="color:gray; font-size:11px;">Sin impresión</span>';

                let rifTexto = venta.rif ? `<br><small>RIF: ${venta.rif}</small>` : '';

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td><strong>${venta.cliente}</strong>${rifTexto}</td>
                    <td>
                        <span style="font-size: 14px;"><b>${venta.pesoKg} Kg</b> (${venta.cantidadBolsas} uds)</span><br>
                        <small style="color: gray;">${venta.medidas}</small>
                        ${textoImpresion}
                    </td>
                    <td>
                        <span class="totales">$${venta.totalUSD}</span><br>
                        <small>Bs. ${venta.totalBs}</small>
                    </td>
                    <td><button class="btn-wa" onclick="enviarWhatsApp(${index})">Enviar</button></td>
                `;
                tbody.appendChild(fila);
            });
        }

        function enviarWhatsApp(index) {
            const v = ventas[index];
            let detalleImpresion = v.esImpresa ? `\n🎨 *Detalles de Impresión:*\n- Caras: ${v.caras}\n- Colores: ${v.colores}` : `\n🎨 *Detalles de Impresión:* Sin impresión`;
            let rifStr = v.rif ? `\n- RIF: ${v.rif}` : '';
            
            const mensaje = `Hola, te saludo desde *Conaplast C.A.*\n\nAquí tienes la cotización de tu pedido:\n\n👤 *Cliente:* ${v.cliente}${rifStr}\n\n📦 *Especificaciones:*\n- Medidas: ${v.medidas}\n- Pedido total: ${v.pesoKg} Kg\n- Rendimiento aprox: ${v.cantidadBolsas} bolsas${detalleImpresion}\n\n💰 *Inversión total:*\n- Dólares: $${v.totalUSD} (a $${v.precioKg}/Kg)\n- Bolívares: Bs. ${v.totalBs} (Tasa: ${v.tasa})\n\nQuedamos a tu entera disposición.`;
            
            const textoCodificado = encodeURIComponent(mensaje);
            window.open(`https://wa.me/?text=${textoCodificado}`, '_blank');
        }

        function borrarHistorial() {
            if(confirm("¿Estás seguro de que deseas borrar todo el historial?")) {
                ventas = [];
                localStorage.removeItem('ventasConaplastV5');
                mostrarVentas();
            }
        }
    </script>

</body>
</html>
