<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conaplast C.A.</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 15px;
            /* Degradado azul oscuro con formas geométricas en los bordes */
            background: linear-gradient(135deg, #0f204c 0%, #1e3a8a 50%, #0f204c 100%);
            background-attachment: fixed;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Formas geométricas abstractas superpuestas en el fondo */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background-color: rgba(30, 58, 138, 0.3); /* Azul un poco más claro y transparente */
            transform: rotate(45deg);
            z-index: -1;
        }

        body::before {
            top: -100px;
            left: -100px;
        }

        body::after {
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            margin-top: 15px;
        }
        
        .logo-img {
            max-width: 250px;
            height: auto;
        }
        
        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .form-row {
            display: flex;
            gap: 10px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #3a3a3c;
            font-size: 13px;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafafa;
        }
        
        .input-calculado {
            background-color: #e5e5ea !important;
            color: #0F204C;
            font-weight: bold;
            border: 1px dashed #a1a1aa;
        }
        
        .section-title {
            color: #0F204C;
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 1px solid #e5e5ea;
            padding-bottom: 5px;
            margin-top: 20px;
        }
        
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid #e5e5ea;
            border-bottom: 1px solid #e5e5ea;
            margin-bottom: 15px;
        }
        
        .switch-container label {
            margin-bottom: 0;
            font-size: 15px;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        button {
            background-color: #0F204C;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:active {
            background-color: #0B193C;
        }
        
        .btn-borrar {
            background-color: #ff3b30;
            margin-top: 20px;
        }
        
        .btn-wa {
            background-color: #25D366;
            padding: 8px 12px;
            font-size: 14px;
            margin-top: 0;
            border-radius: 6px;
        }
        
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            border-bottom: 1px solid #e5e5ea;
            padding: 12px 5px;
            text-align: left;
            vertical-align: middle;
        }
        
        .totales {
            font-weight: bold;
            color: #34c759;
            font-size: 15px;
        }
        
        .impresion-tag {
            color: #ff9500;
            font-size: 12px;
            font-weight: bold;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .modal-title {
            margin-top: 0;
            color: #0F204C;
            font-size: 22px;
            margin-bottom: 15px;
        }
        
        .modal-text {
            font-size: 18px;
            color: #1c1c1e;
            margin: 10px 0;
            line-height: 1.4;
        }
        
        .modal-btn {
            background-color: #0F204C;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="modalResultado" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">✅ Registro Exitoso</h3>
            <div id="modalCuerpoTexto" class="modal-text"></div>
            <button class="modal-btn" onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="Logo Conaplast" class="logo-img" onerror="this.style.display='none'">
    </div>

    <div class="card">
        <div class="section-title">1. Datos del Cliente</div>
        <div class="form-group">
            <label for="cliente">Nombre del Cliente:</label>
            <input type="text" id="cliente" placeholder="Ej: Inversiones XYZ">
        </div>
        <div class="form-group">
            <label for="rif">RIF:</label>
            <input type="text" id="rif" placeholder="Ej: J-12345678-9">
        </div>
        
        <div class="section-title">2. Medidas de la Bolsa (cm)</div>
        <div class="form-row">
            <div class="form-group">
                <label for="ancho">Ancho:</label>
                <input type="number" id="ancho" step="0.1" placeholder="Ej: 40" oninput="calcularPesosAutomaticos()">
            </div>
            <div class="form-group">
                <label for="largo">Largo:</label>
                <input type="number" id="largo" step="0.1" placeholder="Ej: 50" oninput="calcularPesosAutomaticos()">
            </div>
            <div class="form-group">
                <label for="espesor">Espesor:</label>
                <input type="number" id="espesor" step="0.001" placeholder="Ej: 0.005" oninput="calcularPesosAutomaticos()">
            </div>
        </div>

        <div class="switch-container">
            <label for="llevaFuelle">¿Lleva fuelle?</label>
            <input type="checkbox" id="llevaFuelle" onchange="toggleFuelle()">
        </div>

        <div id="opcionesFuelle" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="fuelleIzq">Fuelle Izquierdo (cm):</label>
                    <input type="number" id="fuelleIzq" step="0.1" oninput="calcularPesosAutomaticos()">
                </div>
                <div class="form-group">
                    <label for="fuelleDer">Fuelle Derecho (cm):</label>
                    <input type="number" id="fuelleDer" step="0.1" oninput="calcularPesosAutomaticos()">
                </div>
            </div>
        </div>

        <div class="section-title">3. Impresión</div>
        <div class="switch-container">
            <label for="impresa">¿Bolsa Impresa?</label>
            <input type="checkbox" id="impresa" onchange="toggleImpresion()">
        </div>
        
        <div id="opcionesImpresion" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="caras">Caras Impresas:</label>
                    <select id="caras">
                        <option value="1">1 Cara</option>
                        <option value="2">2 Caras</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="colores">N° de Colores (Max 6):</label>
                    <select id="colores">
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-title">4. Datos del Pedido</div>
        <div class="form-row">
            <div class="form-group">
                <label for="pesoEspecifico">Peso Específico:</label>
                <input type="text" id="pesoEspecifico" class="input-calculado" readonly placeholder="0.00 g">
            </div>
            <div class="form-group">
                <label for="pesoMillar">Peso Millar:</label>
                <input type="text" id="pesoMillar" class="input-calculado" readonly placeholder="0.00 Kg">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="tipoCalculo">Calcular a partir de:</label>
                <select id="tipoCalculo" onchange="actualizarPlaceholder()">
                    <option value="kg">Kg</option>
                    <option value="unidades">Bolsas</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lblValor" for="valorPedido">Cantidad (Kg):</label>
                <input type="number" id="valorPedido" placeholder="Mínimo 300">
            </div>
        </div>

        <div class="section-title">5. Finanzas</div>
        <div class="form-row">
            <div class="form-group">
                <label for="precioKg">Precio por Kg ($):</label>
                <input type="number" id="precioKg" step="0.01">
            </div>
            <div class="form-group">
                <label for="tasa">Tasa (Bs por $):</label>
                <input type="number" id="tasa" step="0.01">
            </div>
        </div>

        <button onclick="procesarPedido()">Calcular y Registrar Pedido</button>
    </div>

    <div class="table-container">
        <table id="tablaRegistros">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Detalles</th>
                    <th>Totales</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="listaVentas"></tbody>
        </table>
        <button class="btn-borrar" onclick="borrarHistorial()">Borrar Historial</button>
    </div>

    <script>
        let ventas = JSON.parse(localStorage.getItem('ventasConaplastV6')) || [];
        mostrarVentas();

        function calcularPesosAutomaticos() {
            const ancho = parseFloat(document.getElementById('ancho').value) || 0;
            const largo = parseFloat(document.getElementById('largo').value) || 0;
            const espesor = parseFloat(document.getElementById('espesor').value) || 0;
            const llevaFuelle = document.getElementById('llevaFuelle').checked;
            const fuelleIzq = llevaFuelle ? (parseFloat(document.getElementById('fuelleIzq').value) || 0) : 0;
            const fuelleDer = llevaFuelle ? (parseFloat(document.getElementById('fuelleDer').value) || 0) : 0;
            const densidad = 0.92;

            if (ancho > 0 && largo > 0 && espesor > 0) {
                const anchoTotal = fuelleIzq + ancho + fuelleDer;
                const pesoG = (anchoTotal * largo * (espesor * 2) * densidad);
                document.getElementById('pesoEspecifico').value = pesoG.toFixed(2) + ' g';
                document.getElementById('pesoMillar').value = pesoG.toFixed(2) + ' Kg';
            } else {
                document.getElementById('pesoEspecifico').value = '';
                document.getElementById('pesoMillar').value = '';
            }
        }

        function toggleImpresion() { document.getElementById('opcionesImpresion').style.display = document.getElementById('impresa').checked ? 'block' : 'none'; }
        function toggleFuelle() { document.getElementById('opcionesFuelle').style.display = document.getElementById('llevaFuelle').checked ? 'block' : 'none'; calcularPesosAutomaticos(); }
        function actualizarPlaceholder() {
            const tipo = document.getElementById('tipoCalculo').value;
            document.getElementById('lblValor').innerText = tipo === 'kg' ? 'Cantidad (Kg):' : 'Cantidad (Bolsas):';
        }
        function cerrarModal() { document.getElementById('modalResultado').style.display = 'none'; }

        function procesarPedido() {
            const cliente = document.getElementById('cliente').value;
            const rif = document.getElementById('rif').value;
            const ancho = parseFloat(document.getElementById('ancho').value);
            const largo = parseFloat(document.getElementById('largo').value);
            const espesor = parseFloat(document.getElementById('espesor').value);
            const valorPedido = parseFloat(document.getElementById('valorPedido').value);
            const precioKg = parseFloat(document.getElementById('precioKg').value);
            const tasa = parseFloat(document.getElementById('tasa').value);
            
            if (!cliente || !ancho || !largo || !espesor || !valorPedido || !precioKg || !tasa) { alert("⚠️ Completa los datos."); return; }

            const llevaFuelle = document.getElementById('llevaFuelle').checked;
            const fuelleIzq = llevaFuelle ? (parseFloat(document.getElementById('fuelleIzq').value) || 0) : 0;
            const fuelleDer = llevaFuelle ? (parseFloat(document.getElementById('fuelleDer').value) || 0) : 0;
            const anchoTotal = fuelleIzq + ancho + fuelleDer;
            const pesoUnaBolsaKg = (anchoTotal * largo * (espesor * 2) * 0.92) / 1000;

            let kgFinal = 0, bolsasFinal = 0;
            if (document.getElementById('tipoCalculo').value === 'kg') {
                kgFinal = valorPedido; bolsasFinal = Math.floor(kgFinal / pesoUnaBolsaKg);
            } else {
                bolsasFinal = valorPedido; kgFinal = bolsasFinal * pesoUnaBolsaKg;
            }

            const nuevaVenta = {
                cliente, rif,
                medidas: llevaFuelle ? `[FI:${fuelleIzq}+A:${ancho}+FD:${fuelleDer}]x${largo}` : `${ancho}x${largo}`,
                impresion: document.getElementById('impresa').checked ? `${document.getElementById('caras').value} caras / ${document.getElementById('colores').value} col` : 'No',
                pesoKg: kgFinal.toFixed(2),
                cantidadBolsas: bolsasFinal.toLocaleString('es-VE'),
                totalUSD: (kgFinal * precioKg).toFixed(2),
                totalBs: (kgFinal * precioKg * tasa).toFixed(2),
                rawPrecio: precioKg, rawTasa: tasa
            };

            ventas.unshift(nuevaVenta);
            localStorage.setItem('ventasConaplastV6', JSON.stringify(ventas));
            mostrarVentas();

            document.getElementById('modalCuerpoTexto').innerHTML = `<strong>Kilos:</strong><br><span style="font-size:26px;color:#0F204C">${nuevaVenta.pesoKg} Kg</span><br><br><strong>Unidades:</strong><br><span style="font-size:26px;color:#0F204C">${nuevaVenta.cantidadBolsas}</span>`;
            document.getElementById('modalResultado').style.display = 'flex';
        }

        function mostrarVentas() {
            const tbody = document.getElementById('listaVentas');
            tbody.innerHTML = ''; 
            ventas.forEach((v, index) => {
                const fila = document.createElement('tr');
                fila.innerHTML = `<td><strong>${v.cliente}</strong><br><small>${v.rif || ''}</small></td>
                    <td><small><b>${v.pesoKg} Kg</b> (${v.cantidadBolsas})</small><br><small style="color:gray">${v.medidas}</small></td>
                    <td><span class="totales">$${v.totalUSD}</span><br><small>Bs. ${v.totalBs}</small></td>
                    <td><button class="btn-wa" onclick="enviarWA(${index})">WA</button></td>`;
                tbody.appendChild(fila);
            });
        }

        function enviarWA(index) {
            const v = ventas[index];
            const msg = `Hola, cotización de *Conaplast C.A.*\n\n👤 *Cliente:* ${v.cliente}\n📦 *Pedido:* ${v.pesoKg} Kg (${v.cantidadBolsas} uds)\n📏 *Medidas:* ${v.medidas}\n🎨 *Impresión:* ${v.impresion}\n\n💰 *Total:* $${v.totalUSD} / Bs. ${v.totalBs}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function borrarHistorial() { if(confirm("¿Borrar todo?")) { ventas = []; localStorage.removeItem('ventasConaplastV6'); mostrarVentas(); } }
    </script>
</body>
</html>
